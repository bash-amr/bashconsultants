services:

  jekyll:
    image: jekyll/jekyll:latest
    platform: linux/amd64
    command: bash -c "git config --global --add safe.directory /app 2>/dev/null || true && bundle check || bundle install --jobs 4 --retry 3 && bundle exec jekyll serve --watch --livereload --livereload-port 35730 --port 4042 --host 0.0.0.0 --config '_config.yml,_config_dev.yml'"

    volumes:
      - ./:/app
      - ../zer0-mistakes:/zer0-mistakes:ro
      - bundle_cache:/usr/local/bundle
    ports:
      - "4042:4042"
      - "35730:35730"
    working_dir: /app
    environment:
      JEKYLL_ENV: development
      BUNDLE_PATH: /usr/local/bundle

volumes:
  bundle_cache: