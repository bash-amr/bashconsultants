services:

  jekyll:
    # NOTE: jekyll/jekyll:latest ships Ruby 3.1.1, but jekyll-theme-zer0 requires
    # Ruby >= 3.2 (see jekyll-theme-zer0.gemspec). The official ruby image provides
    # a new enough Ruby AND a native arm64 build (no slow amd64 emulation on Apple
    # Silicon). jekyll is installed from the Gemfile, so it must be run via bundle exec.
    image: ruby:3.3
    # --livereload-port 35730 is set explicitly: Jekyll ignores `livereload_port`
    # from _config_dev.yml and otherwise falls back to 35729 (which both mismatches
    # the published 35730 below and collides with the zer0-mistakes container).
    command: bash -c "bundle install && bundle exec jekyll serve --watch --force_polling --host 0.0.0.0 --port 4042 --livereload --livereload-port 35730 --config '_config.yml,_config_dev.yml'"

    volumes:
      - ./:/app
      - ../zer0-mistakes:/zer0-mistakes:ro
      - bundle_cache:/usr/local/bundle
    ports:
      - "4042:4042"
      - "35730:35730"
    working_dir: /app
    environment:
      JEKYLL_ENV: development
      BUNDLE_PATH: /usr/local/bundle

volumes:
  bundle_cache: